name: Release
on:
  push:
    tags:
      - 'v*.*.*'
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal
      - name: Pack NuGet packages
        run: |
          dotnet pack src/OpenSync.Core -c Release --no-build -o ./artifacts /p:Version=$VERSION
          dotnet pack src/OpenSync.Application -c Release --no-build -o ./artifacts /p:Version=$VERSION
          dotnet pack src/OpenSync.Infrastructure -c Release --no-build -o ./artifacts /p:Version=$VERSION
          dotnet pack nupkgs/OpenSync.AspNetCore -c Release --no-build -o ./artifacts /p:Version=$VERSION
          dotnet pack nupkgs/OpenSync.Sdk -c Release --no-build -o ./artifacts /p:Version=$VERSION
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
      - name: Publish to GitHub Packages
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          dotnet nuget add source --username Abubakarstu --password "$GH_TOKEN" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Abubakarstu/index.json"
          dotnet nuget push ./artifacts/*.nupkg --source github --skip-duplicate
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
