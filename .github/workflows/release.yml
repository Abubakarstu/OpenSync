name: Build and Publish OpenSync Packages

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore OpenSync.sln

      - name: Build
        run: dotnet build OpenSync.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OpenSync.sln --configuration Release --no-build --verbosity normal

      - name: Pack OpenSync.AspNetCore
        run: dotnet pack nupkgs/OpenSync.AspNetCore/OpenSync.AspNetCore.csproj --configuration Release --no-build -o nupkgs/output

      - name: Pack OpenSync.Sdk
        run: dotnet pack nupkgs/OpenSync.Sdk/OpenSync.Sdk.csproj --configuration Release --no-build -o nupkgs/output

      - name: Add GitHub Packages source
        run: dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push nupkgs/output/OpenSync.AspNetCore.1.0.0.nupkg --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          dotnet nuget push nupkgs/output/OpenSync.Sdk.1.0.0.nupkg --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            nupkgs/output/OpenSync.AspNetCore.1.0.0.nupkg
            nupkgs/output/OpenSync.Sdk.1.0.0.nupkg
