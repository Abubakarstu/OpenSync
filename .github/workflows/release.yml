name: Build and Publish OpenSync Packages

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    permissions:
      contents: write
      id-token: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore OpenSync.sln

      - name: Build
        run: dotnet build OpenSync.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OpenSync.sln --configuration Release --no-build --verbosity normal

      - name: Pack OpenSync.AspNetCore
        run: dotnet pack nupkgs/OpenSync.AspNetCore/OpenSync.AspNetCore.csproj --configuration Release --no-build -o nupkgs/output

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push nupkgs/output/OpenSync.AspNetCore.1.0.0.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.NUGET_AUTH_TOKEN }} --skip-duplicate

      - name: Publish to NuGet.org (Trusted Publishing)
        run: dotnet nuget push nupkgs/output/OpenSync.AspNetCore.1.0.0.nupkg --source "https://api.nuget.org/v3/index.json" --skip-duplicate
        env:
          NUGET_EXTENSION_FLOW_OIDC: true

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            nupkgs/output/OpenSync.AspNetCore.1.0.0.nupkg
